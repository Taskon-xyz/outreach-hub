<script>
const { createApp, ref, reactive, computed, onMounted, onUnmounted, watch, nextTick, defineComponent } = Vue

// ══════════════════════════════════════════════════════════════════
//  API / WebSocket helpers
// ══════════════════════════════════════════════════════════════════
const API = '/api'
async function api(path, opts = {}) {
  const url = API + path
  const r = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  })
  return r.json()
}
async function apiGet(path) { return api(path) }
async function apiPost(path, body) { return api(path, { method: 'POST', body: JSON.stringify(body) }) }
async function apiPut(path, body) { return api(path, { method: 'PUT', body: JSON.stringify(body) }) }
async function apiDelete(path) { return api(path, { method: 'DELETE' }) }

// WebSocket
const wsConnected = ref(false)
const wsHandlers = {}  // type -> [cb, ...]
let _ws = null

function wsOn(type, cb) {
  if (!wsHandlers[type]) wsHandlers[type] = []
  wsHandlers[type].push(cb)
}
function wsOff(type, cb) {
  if (wsHandlers[type]) wsHandlers[type] = wsHandlers[type].filter(c => c !== cb)
}
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws'
  _ws = new WebSocket(`${proto}://${location.host}/ws`)
  _ws.onopen = () => { wsConnected.value = true }
  _ws.onclose = () => { wsConnected.value = false; setTimeout(connectWS, 2000) }
  _ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data)
      const handlers = wsHandlers[msg.type] || []
      handlers.forEach(cb => cb(msg))
    } catch {}
  }
}

// ══════════════════════════════════════════════════════════════════
//  Shared Components
// ══════════════════════════════════════════════════════════════════
const LogBox = defineComponent({
  props: ['logs'],
  template: `
    <div ref="el" class="log-box bg-bg-900 rounded-lg border border-gray-700/50 p-3 font-mono text-xs leading-relaxed text-gray-400">
      <div v-for="(l,i) in logs" :key="i" v-html="colorize(l)"></div>
      <div v-if="!logs.length" class="text-gray-600 italic">等待日志...</div>
    </div>`,
  methods: {
    colorize(t) {
      if (t.includes('错误') || t.includes('Error') || t.includes('failed'))
        return `<span class="text-red-400">${esc(t)}</span>`
      if (t.includes('✓') || t.includes('成功') || t.includes('done') || t.includes('新增'))
        return `<span class="text-emerald-400">${esc(t)}</span>`
      if (t.includes('⚠') || t.includes('跳过') || t.includes('skip'))
        return `<span class="text-yellow-400">${esc(t)}</span>`
      return esc(t)
    }
  },
  updated() { this.$refs.el && (this.$refs.el.scrollTop = this.$refs.el.scrollHeight) }
})
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

const ProgressBar = defineComponent({
  props: { cur: { default: 0 }, total: { default: 0 } },
  computed: {
    pct() { return this.total > 0 ? Math.min(100, Math.round(this.cur / this.total * 100)) : 0 }
  },
  template: `
    <div class="space-y-1">
      <div class="flex justify-between text-xs text-gray-500">
        <span>{{ cur }} / {{ total }}</span><span>{{ pct }}%</span>
      </div>
      <div class="h-2 bg-bg-900 rounded-full overflow-hidden">
        <div class="h-full bg-accent rounded-full transition-all duration-300" :style="{width: pct+'%'}"></div>
      </div>
    </div>`
})

const StatCard = defineComponent({
  props: ['label', 'value', 'color'],
  template: `
    <div class="bg-bg-700 rounded-xl p-4 border border-gray-700/30">
      <div class="text-xs text-gray-500 mb-1">{{ label }}</div>
      <div :class="['text-2xl font-bold', color || 'text-ok']">{{ value ?? '—' }}</div>
    </div>`
})

// Helper: use worker with WS log/progress
function useWorker(workerId) {
  const logs = ref([])
  const cur = ref(0)
  const total = ref(0)
  const running = ref(false)

  function onLog(msg) {
    if (msg.worker === workerId) logs.value.push(msg.msg)
  }
  function onProgress(msg) {
    if (msg.worker === workerId) { cur.value = msg.cur; total.value = msg.total }
  }
  function onStarted(msg) { if (msg.worker === workerId) running.value = true }
  function onStopped(msg) { if (msg.worker === workerId) running.value = false }

  function mount() {
    wsOn('log', onLog); wsOn('progress', onProgress)
    wsOn('started', onStarted); wsOn('stopped', onStopped)
    // Check if already running
    apiGet('/workers/status').then(r => {
      if (r.data && r.data[workerId]) running.value = true
    })
  }
  function unmount() {
    wsOff('log', onLog); wsOff('progress', onProgress)
    wsOff('started', onStarted); wsOff('stopped', onStopped)
  }

  async function start(params = {}) {
    logs.value = []; cur.value = 0; total.value = 0
    await apiPost(`/workers/${workerId}/start`, { params })
  }
  async function stop() {
    await apiPost(`/workers/${workerId}/stop`, {})
  }
  async function ready() {
    await apiPost(`/workers/${workerId}/ready`, {})
  }

  return { logs, cur, total, running, start, stop, ready, mount, unmount }
}

        <stat-card label="TG 群链接" :value="stats.tg_links" />
        <stat-card label="X 账号" :value="stats.x_links" />
        <stat-card label="TG 管理员" :value="stats.tg_handles" />

        <stat-card label="TG 待发" :value="stats.tg_pending" color="text-warn" />
        <stat-card label="X 待发" :value="stats.x_pending" color="text-warn" />
      </div>
      <h3 class="text-sm font-semibold text-gray-400 mb-3">最近发送</h3>
      <div class="bg-bg-800 rounded-xl border border-gray-700/30 overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr class="text-xs text-gray-500 border-b border-gray-700/30">
            <th class="px-4 py-2 text-left">时间</th><th class="px-4 py-2 text-left">渠道</th>
            <th class="px-4 py-2 text-left">Handle</th><th class="px-4 py-2 text-left">文案</th>
          </tr></thead>
          <tbody>
            <tr v-for="r in recentLogs" :key="r.id" class="border-b border-gray-700/20 hover:bg-bg-700/50">
              <td class="px-4 py-2 text-gray-500 font-mono text-xs">{{ (r.sent_at||'').slice(0,16) }}</td>
              <td class="px-4 py-2"><span :class="r.channel==='telegram'?'text-blue-400':'text-orange-400'" class="text-xs font-medium">{{ r.channel }}</span></td>
              <td class="px-4 py-2 font-mono">@{{ r.handle }}</td>
              <td class="px-4 py-2 text-gray-500">{{ r.message_name }}</td>
            </tr>
            <tr v-if="!recentLogs.length"><td colspan="4" class="px-4 py-6 text-center text-gray-600">暂无记录</td></tr>
          </tbody>
        </table>
      </div>
    </div>`
})


// ══════════════════════════════════════════════════════════════════
//  Tab: Import
// ══════════════════════════════════════════════════════════════════
const importTab = defineComponent({
  components: { LogBox, ProgressBar },
  setup() {
    const mode = ref('website')
    const fileName = ref('')
    const filePath = ref('')
    const delay = ref(4)
    const sourceTag = ref('')
    const projectCount = ref(0)
    const cbWorker = useWorker('crunchbase')
    const wsWorker = useWorker('website_import')
    const active = computed(() => mode.value === 'crunchbase' ? cbWorker : wsWorker)

    async function refreshCount() {
      const r = await apiGet('/counts')
      projectCount.value = r.data?.projects || 0
    }

    async function uploadFile(e) {
      const file = e.target.files[0]
      if (!file) return
      const fd = new FormData()
      fd.append('file', file)
      const r = await fetch('/api/upload/excel', { method: 'POST', body: fd }).then(x => x.json())
      fileName.value = r.data?.name || file.name
      filePath.value = r.data?.path || ''
    }

    async function start() {
      if (!filePath.value) return alert('请先选择 Excel 文件')
      const tag = (sourceTag.value || '').trim()
      if (!tag) return alert('请填写 source tag（本批次分组标签，必填）')
      if (tag === 'tg_left') return alert("source tag 不能为保留值 'tg_left'")
      const params = { excel_path: filePath.value, source_tag: tag }
      if (mode.value === 'crunchbase') params.delay = delay.value
      await active.value.start(params)
    }

    onMounted(() => { cbWorker.mount(); wsWorker.mount(); refreshCount() })
    onUnmounted(() => { cbWorker.unmount(); wsWorker.unmount() })

    return { mode, fileName, filePath, delay, sourceTag, projectCount, active, uploadFile, start, refreshCount, cbWorker, wsWorker }
  },
  template: `
    <div>
      <h2 class="text-xl font-bold text-white mb-4">导入</h2>
      <!-- Mode Switcher -->
      <div class="flex gap-2 mb-4">
        <button v-for="m in [{id:'website',label:'官网直接导入'},{id:'crunchbase',label:'Crunchbase → 官网提取'}]"
          :key="m.id" @click="mode=m.id"
          :class="['px-4 py-2 rounded-lg text-sm font-medium transition',
                    mode===m.id ? 'bg-accent text-white' : 'bg-bg-700 text-gray-400 hover:bg-bg-600']">
          {{ m.label }}
        </button>
      </div>
      <div class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-4">
        <!-- File -->
        <div class="flex items-center gap-3">
          <label class="px-4 py-2 bg-accent hover:bg-accent-dim rounded-lg text-sm text-white cursor-pointer transition">
            选择 Excel
            <input type="file" accept=".xlsx,.xls,.csv" @change="uploadFile" class="hidden">
          </label>
          <span class="text-sm text-gray-400">{{ fileName || '未选择文件' }}</span>
        </div>
        <!-- Delay (crunchbase only) -->
        <div v-if="mode==='crunchbase'" class="flex items-center gap-2">
          <span class="text-sm text-gray-400">请求间隔（秒）：</span>
          <input v-model.number="delay" type="number" min="1" class="w-20 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">
        </div>
        <!-- source tag (required) -->
        <div class="flex items-center gap-2">
          <span class="text-sm text-gray-400 shrink-0">source tag：</span>
          <input v-model="sourceTag" placeholder="必填，如 Q2-airdrop / batch-2026-04"
            class="flex-1 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">
          <span class="text-xs text-gray-500 shrink-0">本批次分组标签（禁用 tg_left）</span>
        </div>
        <div class="text-xs text-gray-500">数据库已有官网：{{ projectCount }} 条</div>
        <progress-bar :cur="active.cur.value" :total="active.total.value" />
        <log-box :logs="active.logs.value" />
        <div class="flex gap-2">
          <button @click="start" :disabled="active.running.value"
            :class="['px-4 py-2 rounded-lg text-sm font-medium transition',
                      active.running.value ? 'bg-gray-700 text-gray-500 cursor-not-allowed' : 'bg-ok text-white hover:bg-ok/80']">
            ▶ {{ active.running.value ? '运行中...' : '开始导入' }}
          </button>
          <button v-if="active.running.value" @click="active.stop()"
            class="px-4 py-2 bg-err hover:bg-err/80 text-white rounded-lg text-sm transition">⏹ 停止</button>
        </div>
      </div>
    </div>`
})


// ══════════════════════════════════════════════════════════════════
//  Tab: Scraper
// ══════════════════════════════════════════════════════════════════
const scraper = defineComponent({
  components: { LogBox, ProgressBar },
  setup() {
    const sources = [
      { id: 'scraper', label: '官网 → TG + X', desc: '访问官网提取 TG/X 链接' },
      { id: 'cb_discover', label: 'Crunchbase → 官网', desc: 'Crunchbase Discover 爬取' },
      { id: 'rootdata', label: 'RootData → 官网+TG+X', desc: 'RootData Fundraising 爬取' },
      { id: 'chainscope', label: 'Old汤-链上变化', desc: 'ChainScope 链上数据变化' },
      { id: 'tokenfinder', label: 'Old汤-低交易量', desc: 'TokenFinder 低交易量代币' },
      { id: 'campaign_twitter', label: '活动项目-Twitter', desc: '活动项目 Twitter 账号' },
      { id: 'campaign_kol', label: '活动项目-KOL', desc: '活动项目 KOL 账号' },
      { id: 'cryptorank', label: 'CryptoRank 融资', desc: 'CryptoRank Funding Rounds' },
    ]
    const activeSrc = ref('scraper')
    const workers = {}
    sources.forEach(s => { workers[s.id] = useWorker(s.id) })

    // Per-source params
    const useLlm = ref(false)
    const scraperConcurrency = ref(5)
    const cbUrl = ref('')
    const rdUrl = ref('https://www.rootdata.com/Fundraising')
    const rdMaxPages = ref(314)
    const rdStartPage = ref(1)
    const crUrl = ref('https://cryptorank.io/funding-rounds?page=1&rows=20')
    const crMaxPages = ref(999)
    const sourceTag = ref('')
    const counts = ref({})

    async function refreshCounts() {
      const r = await apiGet('/counts')
      counts.value = r.data || {}
    }

    async function startSource() {
      const id = activeSrc.value
      const w = workers[id]
      let params = {}
      if (id === 'scraper') params = { use_llm: useLlm.value, concurrency: scraperConcurrency.value }
      else if (id === 'cb_discover') params = { url: cbUrl.value }
      else if (id === 'rootdata') params = { url: rdUrl.value, max_pages: rdMaxPages.value, start_page: rdStartPage.value }
      else if (id === 'cryptorank') params = { url: crUrl.value, max_pages: crMaxPages.value }
      // source_tag 必填（scraper 除外 —— 它从 projects.source 自动继承）
      if (id !== 'scraper') {
        const tag = (sourceTag.value || '').trim()
        if (!tag) return alert('请填写 source tag（本批次分组标签，必填）')
        if (tag === 'tg_left') return alert("source tag 不能为保留值 'tg_left'")
        params.source_tag = tag
      }
      await w.start(params)
    }

    onMounted(() => { Object.values(workers).forEach(w => w.mount()); refreshCounts() })
    onUnmounted(() => { Object.values(workers).forEach(w => w.unmount()) })

    return { sources, activeSrc, workers, useLlm, scraperConcurrency, cbUrl, rdUrl, rdMaxPages, rdStartPage, crUrl, crMaxPages, sourceTag, counts, startSource, refreshCounts }
  },
  template: `
    <div>
      <h2 class="text-xl font-bold text-white mb-4">爬虫</h2>
      <div class="flex gap-4">
        <!-- Left: Source List -->
        <div class="w-48 shrink-0 space-y-1">
          <button v-for="s in sources" :key="s.id" @click="activeSrc=s.id"
            :class="['w-full text-left px-3 py-2.5 rounded-lg text-sm transition',
                      activeSrc===s.id ? 'bg-accent/15 text-accent-light' : 'text-gray-400 hover:bg-bg-700']">
            <div class="font-medium">{{ s.label }}</div>
            <div class="text-xs text-gray-500 mt-0.5">{{ s.desc }}</div>
            <div v-if="workers[s.id].running.value" class="text-xs text-ok mt-0.5">● 运行中</div>
          </button>
        </div>
        <!-- Right: Active Panel -->
        <div class="flex-1 bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-4">
          <h3 class="text-lg font-semibold text-white">{{ sources.find(s=>s.id===activeSrc)?.label }}</h3>

          <!-- scraper params -->
          <div v-if="activeSrc==='scraper'" class="space-y-2">
            <div class="flex items-center gap-2 text-sm">
              <span class="text-gray-400 shrink-0">并发数：</span>
              <input v-model.number="scraperConcurrency" type="number" min="1" max="20"
                class="w-20 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">
              <span class="text-xs text-gray-500">（同时打开的 tab 数量，建议 3~10）</span>
            </div>
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" v-model="useLlm" class="accent-accent">
              发现多个候选时调用 DeepSeek 筛选
            </label>
          </div>

          <!-- cb_discover params -->
          <div v-if="activeSrc==='cb_discover'" class="space-y-2">
            <input v-model="cbUrl" placeholder="Crunchbase Discover URL"
              class="w-full bg-bg-900 border border-gray-700 rounded-lg px-3 py-2 text-sm">
            <button v-if="workers.cb_discover.running.value" @click="workers.cb_discover.ready()"
              class="px-3 py-1.5 bg-ok text-white rounded-lg text-sm">已就位，开始抓取</button>
          </div>

          <!-- rootdata params -->
          <div v-if="activeSrc==='rootdata'" class="space-y-2">
            <input v-model="rdUrl" class="w-full bg-bg-900 border border-gray-700 rounded-lg px-3 py-2 text-sm">
            <div class="flex items-center gap-3">
              <label class="text-sm text-gray-400 flex items-center gap-1">起始页：
                <input v-model.number="rdStartPage" type="number" min="1" class="w-20 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">
              </label>
              <button @click="rdStartPage = Math.floor(Math.random() * rdMaxPages) + 1"
                class="px-2 py-1.5 bg-bg-700 hover:bg-bg-600 text-gray-400 rounded-lg text-xs transition">🎲 随机</button>
              <label class="text-sm text-gray-400 flex items-center gap-1">最大页数：
                <input v-model.number="rdMaxPages" type="number" min="1" class="w-20 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">
              </label>
            </div>
            <button v-if="workers.rootdata.running.value" @click="workers.rootdata.ready()"
              class="px-3 py-1.5 bg-ok text-white rounded-lg text-sm">已就绪</button>
          </div>

          <!-- cryptorank params -->
          <div v-if="activeSrc==='cryptorank'" class="space-y-2">
            <input v-model="crUrl" class="w-full bg-bg-900 border border-gray-700 rounded-lg px-3 py-2 text-sm"
              placeholder="https://cryptorank.io/funding-rounds?page=1&rows=20">
            <div class="flex items-center gap-3">
              <label class="text-sm text-gray-400 flex items-center gap-1">最大页数：
                <input v-model.number="crMaxPages" type="number" min="1" class="w-20 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">

const messages = defineComponent({
  setup() {
    const channels = ['telegram', 'twitter', 'email']
    const templates = reactive({ telegram: [], twitter: [], email: [] })
    const editing = reactive({ telegram: { name: '', content: '' }, twitter: { name: '', content: '' }, email: { name: '', content: '' } })

    async function loadTemplates(ch) {
      const r = await apiGet(`/templates/${ch}`)
      templates[ch] = r.data || []
    }
    async function save(ch) {
      const e = editing[ch]
      if (!e.name.trim()) return alert('请输入版本名')
      await apiPost(`/templates/${ch}`, { name: e.name, content: e.content })
      await loadTemplates(ch)
    }
    async function activate(ch, name) {
      await apiPut(`/templates/${ch}/activate`, { name })
      await loadTemplates(ch)
    }
    async function remove(ch, id) {
      if (!confirm('确定删除？')) return
      await apiDelete(`/templates/${id}`)
      await loadTemplates(ch)
    }
    function load(ch, t) {
      editing[ch].name = t.name
      editing[ch].content = t.content
    }

    onMounted(() => { channels.forEach(loadTemplates) })

    return { channels, templates, editing, save, activate, remove, load, loadTemplates }
  },
  template: `
    <div>
      <h2 class="text-xl font-bold text-white mb-4">文案管理</h2>
      <div class="grid md:grid-cols-3 gap-4">
        <div v-for="ch in channels" :key="ch" class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
          <h3 class="text-lg font-semibold text-white">{{ ch === 'telegram' ? 'Telegram' : ch === 'twitter' ? 'X (Twitter)' : 'Email' }} 文案</h3>
          <!-- Template List -->
          <div class="space-y-1 max-h-40 overflow-y-auto">
            <div v-for="t in templates[ch]" :key="t.id"
              class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-bg-700/50 text-sm">
              <span :class="t.is_active ? 'text-warn' : 'text-gray-600'">{{ t.is_active ? '★' : '☆' }}</span>
              <span class="flex-1 truncate">{{ t.name }}</span>
              <button @click="load(ch,t)" class="text-xs text-accent hover:text-accent-light">加载</button>
              <button @click="activate(ch,t.name)" class="text-xs text-ok hover:text-ok/80">激活</button>
              <button @click="remove(ch,t.id)" class="text-xs text-err hover:text-err/80">删除</button>
            </div>
            <div v-if="!templates[ch].length" class="text-xs text-gray-600 px-3 py-2">暂无文案</div>
          </div>
          <!-- Editor -->
          <textarea v-model="editing[ch].content" rows="7" placeholder="输入文案内容..."
            class="w-full bg-bg-900 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono resize-y"></textarea>
          <div class="flex items-center gap-2">
            <input v-model="editing[ch].name" placeholder="版本名（如：冷启动v1）"
              class="flex-1 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">
            <button @click="save(ch)" class="px-4 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm transition">💾 保存</button>
            <button @click="editing[ch]={name:'',content:''}" class="px-3 py-1.5 bg-bg-700 text-gray-400 rounded-lg text-sm">＋ 新建</button>
          </div>
        </div>
      </div>
    </div>`
})

const sender = defineComponent({
  components: { LogBox },
  setup() {
    const tgW = useWorker('tg_sender')
    const xW = useWorker('x_sender')
    const emW = useWorker('email_sender')

    // TG
    const tgSource = ref('all')
    const tgRate = ref(30)
    const tgTemplate = ref(null)
    const tgSources = ref([{ value: 'all', label: 'all（全部）' }])

    // X
    const xSource = ref('all')
    const xTemplate = ref(null)
    const xPos = ref({ dm: null, chat: null })
    const xSources = ref([{ value: 'all', label: 'all（全部）' }])

    // Email — 共用 x_links 的 source
    const emSource = ref('all')
    const emTemplate = ref(null)
    const emSubject = ref('')
    const emDailyLimit = ref(50)
    const emIntervalMin = ref(30)
    const emIntervalMax = ref(60)

    const isMac = ref(false)

    async function refreshSources() {
      const [tg, x] = await Promise.all([
        apiGet('/sources/tg'),
        apiGet('/sources/x'),
      ])
      tgSources.value = [{ value: 'all', label: 'all（全部）' }].concat(
        (tg.data || []).map(t => ({ value: t, label: t }))
      )
      xSources.value = [{ value: 'all', label: 'all（全部）' }].concat(
        (x.data || []).map(t => ({ value: t, label: t }))
      )
    }

    async function refreshTemplates() {
      const [tg, x, em] = await Promise.all([
        apiGet('/templates/telegram/active'),
        apiGet('/templates/twitter/active'),
        apiGet('/templates/email/active'),
      ])
      tgTemplate.value = tg.data
      xTemplate.value = x.data
      emTemplate.value = em.data
    }
    async function refreshXPos() {
      const r = await apiGet('/settings/x-pos')
      xPos.value = r.data || {}
    }

    async function startTG() {
      if (!tgTemplate.value) return alert('请先在「文案」页设置并激活 Telegram 文案')
      await tgW.start({
        source: tgSource.value, max_per_hour: tgRate.value,
        message_name: tgTemplate.value.name, message_content: tgTemplate.value.content,
      })
    }
    async function startX() {
      if (!xTemplate.value) return alert('请先在「文案」页设置并激活 Twitter 文案')
      if (!isMac.value && (!xPos.value.dm || !xPos.value.chat)) return alert('请先在「设置」页校准 X 坐标')
      await xW.start({
        source: xSource.value === 'all' ? null : xSource.value,
        message_name: xTemplate.value.name, message_content: xTemplate.value.content,
      })
    }
    async function startEmail() {
      if (!emTemplate.value) return alert('请先在「文案」页设置并激活 Email 文案')
      if (!emSubject.value.trim()) return alert('请填写邮件主题')
      await emW.start({
        source: emSource.value === 'all' ? null : emSource.value,
        subject: emSubject.value,
        body: emTemplate.value.content,
        message_name: emTemplate.value.name,
        daily_limit: emDailyLimit.value,
        interval_min: emIntervalMin.value,
        interval_max: emIntervalMax.value,
      })
    }

    onMounted(async () => {
      tgW.mount(); xW.mount(); emW.mount(); refreshTemplates(); refreshSources()
      try { const r = await apiGet('/platform'); isMac.value = r.data?.platform === 'darwin' } catch {}
      if (!isMac.value) refreshXPos()
    })
    onUnmounted(() => { tgW.unmount(); xW.unmount(); emW.unmount() })

    return { tgW, xW, emW, tgSource, tgRate, tgTemplate, tgSources, xSource, xTemplate, xPos, xSources,
             emSource, emTemplate, emSubject, emDailyLimit, emIntervalMin, emIntervalMax, isMac,
             refreshTemplates, refreshSources, startTG, startX, startEmail, refreshXPos }

  },
  template: `

            <input v-model.number="tgRate" type="number" class="w-20 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm">
          </div>
          <div class="text-xs" :class="tgTemplate ? 'text-ok' : 'text-err'">
            激活文案：{{ tgTemplate ? tgTemplate.name + ' (' + tgTemplate.content.length + '字)' : '无（请在「文案」页设置）' }}
            <button @click="refreshTemplates" class="ml-2 text-gray-500 hover:text-gray-300">🔄</button>
          </div>
          <log-box :logs="tgW.logs.value" />
          <div class="flex gap-2">
            <button @click="startTG" :disabled="tgW.running.value"
              :class="['px-4 py-2 rounded-lg text-sm font-medium transition',
                        tgW.running.value ? 'bg-gray-700 text-gray-500 cursor-not-allowed' : 'bg-ok text-white hover:bg-ok/80']">
              ▶ {{ tgW.running.value ? '发送中...' : '开始发送' }}

        </div>
        <!-- X -->

const settings = defineComponent({
  setup() {
    // Cooldown
    const cooldownDays = ref(0)
    const cooldownHours = ref(0)
    const cooldownMsg = ref('')

    // TG Search Pos
    const tgSearchPos = ref({ x: 0, y: 0 })

    // OCR Region
    const ocrRegion = reactive({ top: 80, left: 0, width: 400, height: 800 })

    // Send Check Region
    const scRegion = reactive({ top: 0, left: 0, width: 0, height: 0 })

    // X Pos
    const xPos = ref({ dm: '', chat: '' })

    // TG Credentials
    const tgCreds = reactive({
      parser: { api_id: '', api_hash: '' },
      left:   { api_id: '', api_hash: '' },
      sender: { api_id: '', api_hash: '' },
    })

    // Gmail
    const gmailAddress = ref('')
    const gmailAppPassword = ref('')
    const gmailSaved = ref(false)

    // DeepSeek
    const deepseekKey = ref('')
    const deepseekMasked = ref('')

    // Queue preview
    const preview = ref(null)

    // Calibration
    const calibCountdown = ref(0)
    const calibTarget = ref('')

    async function loadAll() {
      const [cd, pos, ocr, sc, xp, ds, cp, cl, cs] = await Promise.all([
        apiGet('/settings/cooldown'),
        apiGet('/settings/tg-search-pos'),
        apiGet('/settings/ocr-region'),
        apiGet('/settings/send-check-region'),
        apiGet('/settings/x-pos'),
        apiGet('/settings/deepseek-key'),
        apiGet('/settings/tg-credentials/parser'),
        apiGet('/settings/tg-credentials/left'),
        apiGet('/settings/tg-credentials/sender'),
      ])
      cooldownDays.value = cd.data?.days || 0
      cooldownHours.value = cd.data?.hours || 0
      tgSearchPos.value = pos.data || { x: 0, y: 0 }
      Object.assign(ocrRegion, ocr.data || {})
      Object.assign(scRegion, sc.data || {})
      xPos.value = xp.data || {}
      deepseekMasked.value = ds.data?.masked || ''
      const gm = await apiGet('/settings/gmail_address')
      gmailAddress.value = gm.data?.value || ''
      gmailSaved.value = !!gmailAddress.value
      tgCreds.parser = cp.data || { api_id: '', api_hash: '' }
      tgCreds.left = cl.data || { api_id: '', api_hash: '' }
      tgCreds.sender = cs.data || { api_id: '', api_hash: '' }
    }

    async function saveCooldown() {
      await apiPost('/settings/cooldown', { days: cooldownDays.value, hours: cooldownHours.value })
      cooldownMsg.value = '已保存'
      setTimeout(() => cooldownMsg.value = '', 2000)
    }
    async function previewQueue() {
      const r = await apiGet('/queue/preview')
      preview.value = r.data
    }
    async function saveOcrRegion() {
      await apiPost('/settings/ocr-region', { ...ocrRegion })
      alert('OCR 区域已保存')
    }
    async function saveScRegion() {
      await apiPost('/settings/send-check-region', { ...scRegion })
      alert('发送检测区域已保存')
    }
    async function saveTgCreds(purpose) {
      await apiPost(`/settings/tg-credentials/${purpose}`, tgCreds[purpose])
      alert(`${purpose} 凭证已保存`)
    }
    async function saveGmail() {
      await apiPost('/settings', { key: 'gmail_address', value: gmailAddress.value })
      if (gmailAppPassword.value) {
        await apiPost('/settings', { key: 'gmail_app_password', value: gmailAppPassword.value })
        gmailAppPassword.value = ''
      }
      gmailSaved.value = true
      alert('Gmail 设置已保存')
    }
    async function saveDeepseek() {
      await apiPost('/settings/deepseek-key', { key: deepseekKey.value })
      deepseekKey.value = ''
      const r = await apiGet('/settings/deepseek-key')
      deepseekMasked.value = r.data?.masked || ''
      alert('已保存')
    }
    const calibMsg = ref('')

    async function calibrate(target, delay = 5) {
      calibTarget.value = target
      calibMsg.value = ''
      const r = await apiPost(`/calibrate/${target}?delay=${delay}`, {})
      if (r.code !== 0) calibMsg.value = '校准启动失败: ' + (r.msg || '')
    }

    async function saveXPos() {
      await apiPost('/settings/x-pos', { dm: xPos.value.dm || null, chat: xPos.value.chat || null })
      calibMsg.value = '坐标已保存'
      setTimeout(() => calibMsg.value = '', 2000)
    }

    async function resetXPos() {
      xPos.value = { dm: '', chat: '' }
      await apiPost('/settings/x-pos', { dm: '', chat: '' })
      calibMsg.value = '坐标已重置'
      setTimeout(() => calibMsg.value = '', 2000)
    }

    // Listen for calibration WS events
    function onCalib(msg) {
      if (msg.type === 'calibrate') {
        calibCountdown.value = msg.countdown || 0
        calibTarget.value = msg.target
        if (msg.error) {
          calibMsg.value = '校准失败: ' + msg.error
        } else if (msg.x !== undefined) {
          // Calibration done — update directly for immediate feedback
          const coord = `${msg.x},${msg.y}`
          if (msg.target === 'tg_search') {
            tgSearchPos.value = { x: msg.x, y: msg.y }
          } else if (msg.target === 'x_dm') {
            xPos.value = { ...xPos.value, dm: coord }
          } else if (msg.target === 'x_chat') {
            xPos.value = { ...xPos.value, chat: coord }
          }
          calibMsg.value = `已捕获坐标: (${msg.x}, ${msg.y}) — 已自动保存`
          setTimeout(() => calibMsg.value = '', 3000)
        }
      }
    }
    onMounted(() => { loadAll(); wsOn('calibrate', onCalib) })
    onUnmounted(() => { wsOff('calibrate', onCalib) })

    return { cooldownDays, cooldownHours, cooldownMsg, saveCooldown,
             tgSearchPos, ocrRegion, scRegion, xPos,
             tgCreds, deepseekKey, deepseekMasked,
             gmailAddress, gmailAppPassword, gmailSaved, saveGmail,
             preview, previewQueue,
             saveOcrRegion, saveScRegion, saveTgCreds, saveDeepseek,
             calibrate, calibCountdown, calibTarget, calibMsg,
             saveXPos, resetXPos, loadAll }
  },
  template: `
    <div class="space-y-6">
      <h2 class="text-xl font-bold text-white">设置</h2>

      <!-- Cooldown -->
      <section class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">DM 冷却时间</h3>
        <p class="text-xs text-gray-500">冷却=0 表示每个 handle 只发一次（永不重发）</p>
        <div class="flex items-center gap-3">
          <label class="text-sm text-gray-400">天：<input v-model.number="cooldownDays" type="number" min="0"
            class="w-16 ml-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <label class="text-sm text-gray-400">时：<input v-model.number="cooldownHours" type="number" min="0" max="23"
            class="w-16 ml-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <button @click="saveCooldown" class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm">💾 保存</button>
          <button @click="previewQueue" class="px-3 py-1.5 bg-bg-700 hover:bg-bg-600 text-gray-300 rounded-lg text-sm">预览待发数量</button>
          <span v-if="cooldownMsg" class="text-xs text-ok">{{ cooldownMsg }}</span>
        </div>
        <div v-if="preview" class="text-xs text-gray-400 bg-bg-900 rounded-lg p-3 space-y-1">
          <div>TG imported 待发：<span class="text-ok">{{ preview.tg_imported }}</span></div>
          <div>TG parsed 待发：<span class="text-ok">{{ preview.tg_parsed }}</span></div>
          <div>TG left 待发：<span class="text-ok">{{ preview.tg_left }}</span></div>
          <div>X 待发：<span class="text-ok">{{ preview.x }}</span></div>
          <div class="font-medium pt-1 border-t border-gray-700/30">TG 合计：{{ preview.tg_imported + preview.tg_parsed + preview.tg_left }}</div>
        </div>
      </section>

      <!-- TG Search Position -->
      <section class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">TG 搜索栏位置</h3>
        <div class="flex items-center gap-4">
          <span class="text-sm text-ok">当前坐标：({{ tgSearchPos.x }}, {{ tgSearchPos.y }})</span>
          <button @click="calibrate('tg_search')"
            class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm">🎯 校准搜索栏</button>
          <span v-if="calibTarget==='tg_search' && calibCountdown>0" class="text-lg font-bold text-accent">{{ calibCountdown }}s</span>
        </div>
      </section>

      <!-- OCR Region -->
      <section class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">TG OCR 截图区域</h3>
        <div class="grid grid-cols-4 gap-3">
          <label class="text-sm text-gray-400">上：<input v-model.number="ocrRegion.top" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <label class="text-sm text-gray-400">左：<input v-model.number="ocrRegion.left" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <label class="text-sm text-gray-400">宽：<input v-model.number="ocrRegion.width" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <label class="text-sm text-gray-400">高：<input v-model.number="ocrRegion.height" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
        </div>
        <button @click="saveOcrRegion" class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm">💾 保存</button>
      </section>

      <!-- Send Check Region -->
      <section class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">TG 发送检测截图区域</h3>
        <div class="grid grid-cols-4 gap-3">
          <label class="text-sm text-gray-400">上：<input v-model.number="scRegion.top" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <label class="text-sm text-gray-400">左：<input v-model.number="scRegion.left" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <label class="text-sm text-gray-400">宽：<input v-model.number="scRegion.width" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
          <label class="text-sm text-gray-400">高：<input v-model.number="scRegion.height" type="number"
            class="w-full mt-1 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm"></label>
        </div>
        <button @click="saveScRegion" class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm">💾 保存</button>
      </section>

      <!-- X Coords -->
      <section class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">X (Twitter) 坐标校准</h3>
        <div class="space-y-2">
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-400 w-28 shrink-0">DM 按钮坐标：</span>
            <input v-model="xPos.dm" placeholder="x,y（如 1511,300）"
              class="flex-1 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm font-mono"
              :class="xPos.dm ? 'text-ok border-ok/30' : ''">
            <button @click="calibrate('x_dm')" class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm whitespace-nowrap">🎯 校准</button>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-400 w-28 shrink-0">输入框坐标：</span>
            <input v-model="xPos.chat" placeholder="x,y（如 2589,400）"
              class="flex-1 bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm font-mono"
              :class="xPos.chat ? 'text-ok border-ok/30' : ''">
            <button @click="calibrate('x_chat', 8)" class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm whitespace-nowrap">🎯 校准</button>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button @click="saveXPos" class="px-3 py-1.5 bg-ok hover:bg-ok/80 text-white rounded-lg text-sm">💾 保存坐标</button>
          <button @click="resetXPos" class="px-3 py-1.5 bg-bg-700 hover:bg-bg-600 text-gray-400 rounded-lg text-sm">重置</button>
          <span v-if="(calibTarget==='x_dm'||calibTarget==='x_chat') && calibCountdown>0"
            class="text-lg font-bold text-accent animate-pulse">{{ calibCountdown }}s — 请将鼠标移到目标位置</span>
          <span v-if="calibMsg" class="text-xs" :class="calibMsg.includes('失败') ? 'text-err' : 'text-ok'">{{ calibMsg }}</span>
        </div>
        <p class="text-xs text-gray-500">校准：点击「🎯 校准」后在倒计时内将鼠标移到目标位置；或直接输入坐标后点「💾 保存坐标」</p>
      </section>

      <!-- TG Credentials -->
      <section v-for="p in ['parser','left','sender']" :key="p"
        class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">TG 账号 — {{ {parser:'群管理员解析',left:'离群用户扫描',sender:'DM 发送'}[p] }}</h3>
        <div class="flex items-center gap-3">
          <label class="text-sm text-gray-400">API ID：
            <input v-model="tgCreds[p].api_id" class="ml-1 w-32 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm">
          </label>
          <label class="text-sm text-gray-400">API Hash：
            <input v-model="tgCreds[p].api_hash" class="ml-1 w-64 bg-bg-900 border border-gray-700 rounded-lg px-2 py-1 text-sm font-mono">
          </label>
          <button @click="saveTgCreds(p)" class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm">💾 保存</button>
        </div>
      </section>

      <!-- DeepSeek -->
      <section class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">DeepSeek API Keys</h3>
        <div v-if="deepseekMasked" class="text-xs text-ok">当前：{{ deepseekMasked }}</div>
        <textarea v-model="deepseekKey" rows="3" placeholder="每行一个 API Key，或用逗号分隔"
          class="w-full bg-bg-900 border border-gray-700 rounded-lg px-3 py-2 text-sm font-mono resize-y"></textarea>
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-500">多个 Key 轮询使用，分摊压力</span>
          <button @click="saveDeepseek" class="ml-auto px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm">💾 保存</button>
        </div>
      </section>

      <!-- Gmail SMTP -->
      <section class="bg-bg-800 rounded-xl border border-gray-700/30 p-5 space-y-3">
        <h3 class="text-base font-semibold text-white">📧 Gmail 发件设置</h3>
        <div v-if="gmailSaved" class="text-xs text-ok">已配置：{{ gmailAddress }}</div>
        <div class="space-y-2">
          <input v-model="gmailAddress" type="email" placeholder="Gmail 地址（如 you@gmail.com）"
            class="w-full bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm font-mono">
          <input v-model="gmailAppPassword" type="password" placeholder="Google App Password（留空则不更新）"
            class="w-full bg-bg-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm font-mono">
          <div class="text-xs text-gray-500">在 Google 账号 → 安全 → 应用专用密码 中生成</div>
          <button @click="saveGmail" class="px-3 py-1.5 bg-accent hover:bg-accent-dim text-white rounded-lg text-sm">💾 保存</button>
        </div>
      </section>
    </div>`
})


// ══════════════════════════════════════════════════════════════════
//  App
// ══════════════════════════════════════════════════════════════════
const app = createApp({
  components: { dashboard, 'import-tab': importTab, scraper, parser, messages, sender, history, settings },
  setup() {
    const tabs = [
      { id: 'dashboard',  icon: '📊', label: '仪表盘' },
      { id: 'import-tab', icon: '📥', label: '导入' },
      { id: 'scraper',    icon: '🔍', label: '爬虫' },
      { id: 'parser',     icon: '🔬', label: '解析' },
      { id: 'messages',   icon: '✉️', label: '文案' },
      { id: 'sender',     icon: '📤', label: '发送' },
      { id: 'history',    icon: '📋', label: '记录' },
      { id: 'settings',   icon: '⚙️', label: '设置' },
    ]
    const currentTab = ref('dashboard')
    onMounted(connectWS)

    async function shutdown() {
      if (!confirm('确定退出服务器？\n当前运行的 worker 会被立即终止。')) return
      try { await apiPost('/shutdown', {}) } catch (e) {}
      document.body.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#9ca3af;background:#0f1117;font-family:Inter,sans-serif;font-size:15px">服务器已关闭，可以关闭此页面</div>'
    }

    return { tabs, currentTab, wsConnected, shutdown }
  }
})

app.component('log-box', LogBox)
app.component('progress-bar', ProgressBar)
app.component('stat-card', StatCard)
app.mount('#app')
</script>
</body>
</html>
